<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>钓一盏鱼灯 - 手机控制器</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a1a30;
            color: #e0d0a0;
            font-family: system-ui, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            touch-action: none;
        }
        h1 { font-size: 1.4em; margin-bottom: 8px; }
        .status {
            font-size: 0.9em;
            color: #88aacc;
            margin-bottom: 20px;
        }
        .status.connected { color: #66ee88; }
        .status.error { color: #ee6666; }
        .touch-area {
            width: 90vw;
            height: 50vh;
            border: 2px solid rgba(200,180,100,0.3);
            border-radius: 16px;
            background: rgba(255,255,255,0.03);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 1.1em;
            color: #aaa;
            position: relative;
        }
        .touch-area.active {
            border-color: rgba(200,180,100,0.8);
            background: rgba(200,180,100,0.05);
        }
        .btn-row {
            display: flex;
            gap: 12px;
            margin-top: 20px;
        }
        .btn {
            padding: 12px 24px;
            border-radius: 12px;
            background: rgba(200,180,100,0.15);
            border: 1px solid rgba(200,180,100,0.4);
            color: #e0d0a0;
            font-size: 1em;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background: rgba(200,180,100,0.3); }
        .gyro-info {
            margin-top: 12px;
            font-size: 0.8em;
            color: #667;
        }
        #camera-section {
            margin-top: 16px;
            text-align: center;
        }
        #phone-video {
            width: 160px;
            height: 120px;
            border-radius: 8px;
            border: 1px solid rgba(200,180,100,0.3);
        }
    </style>
</head>
<body>
    <h1>🐟 钓一盏鱼灯</h1>
    <div class="status" id="status">正在连接主屏...</div>
    
    <div class="touch-area" id="touch-area">
        <p>👆 触摸此区域控制</p>
        <p style="font-size:0.8em; margin-top:8px; color:#888">
            单指滑动 = 手掌移动<br>
            双指捏合 = 捏合手势<br>
            摇晃手机 = 吹气效果
        </p>
    </div>
    
    <div class="btn-row">
        <div class="btn" id="btn-pinch">🤏 捏合</div>
        <div class="btn" id="btn-ritual-next">仪式完成</div>
        <div class="btn" id="btn-fist">✊</div>
        <div class="btn" id="btn-palm">🖐️</div>
    </div>
    
    <div class="gyro-info" id="gyro-info">陀螺仪: --</div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
    const params = new URLSearchParams(location.search);
    const hostPeerId = params.get('peer');
    const statusEl = document.getElementById('status');
    const touchArea = document.getElementById('touch-area');
    let conn = null;

    if (!hostPeerId) {
        statusEl.textContent = '❌ 缺少连接参数，请从主屏扫码';
        statusEl.className = 'status error';
    } else {
        initPeer();
    }

    function initPeer() {
        const peer = new Peer();
        peer.on('open', (id) => {
            statusEl.textContent = '正在连接主屏...';
            conn = peer.connect(hostPeerId, { reliable: true });
            
            conn.on('open', () => {
                statusEl.textContent = '✅ 已连接主屏';
                statusEl.className = 'status connected';
                setupControls();
            });
            
            conn.on('close', () => {
                statusEl.textContent = '❌ 连接断开';
                statusEl.className = 'status error';
            });
            
            conn.on('error', (err) => {
                statusEl.textContent = '❌ 连接失败: ' + err.message;
                statusEl.className = 'status error';
            });
        });
        
        peer.on('error', (err) => {
            statusEl.textContent = '❌ PeerJS错误: ' + err.type;
            statusEl.className = 'status error';
        });
    }

    function send(data) {
        if (conn && conn.open) {
            conn.send(data);
        }
    }

    function setupControls() {
        // 触摸区域 → 手掌位置
        let lastTouch = null;
        touchArea.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchArea.classList.add('active');
            const t = e.touches[0];
            const rect = touchArea.getBoundingClientRect();
            lastTouch = { x: (t.clientX - rect.left) / rect.width - 0.5,
                          y: (t.clientY - rect.top) / rect.height - 0.5 };
            send({ type: 'hand', palmX: lastTouch.x, palmY: lastTouch.y, detected: true, fingersUp: 3 });
        });
        
        touchArea.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const t = e.touches[0];
            const rect = touchArea.getBoundingClientRect();
            const x = (t.clientX - rect.left) / rect.width - 0.5;
            const y = (t.clientY - rect.top) / rect.height - 0.5;
            
            // 双指 → 捏合检测
            if (e.touches.length >= 2) {
                const dx = e.touches[0].clientX - e.touches[1].clientX;
                const dy = e.touches[0].clientY - e.touches[1].clientY;
                const dist = Math.sqrt(dx*dx + dy*dy) / rect.width;
                send({ type: 'hand', palmX: x, palmY: y, detected: true, pinchDist: dist, fingersUp: 2 });
            } else {
                send({ type: 'hand', palmX: x, palmY: y, detected: true, fingersUp: 3 });
            }
            lastTouch = { x, y };
        });
        
        touchArea.addEventListener('touchend', (e) => {
            e.preventDefault();
            touchArea.classList.remove('active');
            send({ type: 'hand', detected: false });
        });

        // 按钮
        document.getElementById('btn-pinch').addEventListener('touchstart', (e) => {
            e.preventDefault();
            send({ type: 'gesture', gesture: 'pinch' });
        });
        document.getElementById('btn-ritual-next').addEventListener('touchstart', (e) => {
            e.preventDefault();
            send({ type: 'gesture', gesture: 'ritual-next' });
        });
        document.getElementById('btn-fist').addEventListener('touchstart', (e) => {
            e.preventDefault();
            send({ type: 'hand', palmX: lastTouch?.x || 0, palmY: lastTouch?.y || 0, detected: true, fingersUp: 0 });
        });
        document.getElementById('btn-fist').addEventListener('touchend', (e) => {
            e.preventDefault();
            send({ type: 'hand', palmX: lastTouch?.x || 0, palmY: lastTouch?.y || 0, detected: true, fingersUp: 3 });
        });
        document.getElementById('btn-palm').addEventListener('touchstart', (e) => {
            e.preventDefault();
            send({ type: 'hand', palmX: lastTouch?.x || 0, palmY: lastTouch?.y || 0, detected: true, fingersUp: 5 });
        });
        document.getElementById('btn-palm').addEventListener('touchend', (e) => {
            e.preventDefault();
            send({ type: 'hand', palmX: lastTouch?.x || 0, palmY: lastTouch?.y || 0, detected: true, fingersUp: 3 });
        });

        // 陀螺仪/加速度计 → 摇晃=吹气
        let shakeThreshold = 15;
        let lastAccel = { x: 0, y: 0, z: 0 };
        
        if (window.DeviceMotionEvent) {
            // iOS 13+ 需要请求权限
            if (typeof DeviceMotionEvent.requestPermission === 'function') {
                touchArea.addEventListener('click', async () => {
                    try {
                        const perm = await DeviceMotionEvent.requestPermission();
                        if (perm === 'granted') startGyro();
                    } catch(e) { console.warn(e); }
                }, { once: true });
            } else {
                startGyro();
            }
        }
        
        function startGyro() {
            window.addEventListener('devicemotion', (e) => {
                const a = e.accelerationIncludingGravity;
                if (!a) return;
                const delta = Math.abs(a.x - lastAccel.x) + Math.abs(a.y - lastAccel.y) + Math.abs(a.z - lastAccel.z);
                lastAccel = { x: a.x, y: a.y, z: a.z };
                
                document.getElementById('gyro-info').textContent = 
                    `加速度: ${delta.toFixed(1)} ${delta > shakeThreshold ? '🌊 吹气!' : ''}`;
                
                if (delta > shakeThreshold) {
                    const strength = Math.min((delta - shakeThreshold) / 30, 1.0);
                    send({ type: 'blow', strength });
                }
            });
        }
    }
    </script>
</body>
</html>
